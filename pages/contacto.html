<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../img/perfil.png" type="image/png" />
    <title>Contacto</title>
    <link rel="stylesheet" href="../css/estilos.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <div class="logo-nombre">
        <a href="../index.html">
          <img src="../img/perfil.png" alt="Logo" class="logo" />
        </a>

        <h1>Contacto</h1>
      </div>
      <nav>
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="../index.html#sobre-mi">Sobre mí</a></li>
          <li><a href="../index.html#habilidades">Habilidades</a></li>
          <li><a href="../pages/proyectos.html">Proyectos</a></li>
        </ul>
      </nav>
    </header>

    <!-- MAIN -->
    <main>
      <section>
        <h2>Formulario de Contacto</h2>

        <form action="#" method="POST">
          <fieldset>
            <legend>Datos Personales</legend>

            <!-- NOMBRE -->
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" required />

            <!-- EMAIL -->
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" required />

            <!-- TEL -->
            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" />

            <!-- FECHA -->
            <label for="fecha">Fecha de nacimiento:</label>
            <input type="date" id="fecha" name="fecha" />

            <!-- SELECT -->
            <label for="pais">País:</label>
            <select id="pais" name="pais">
              <option value="">Seleccione</option>
              <option value="cr">Costa Rica</option>
              <option value="mx">México</option>
              <option value="co">Otro</option>
            </select>

            <!-- RADIO -->
            <p>Tipo de consulta:</p>
            <input type="radio" id="consulta" name="tipo" value="consulta" />
            <label for="consulta">Consulta</label>

            <input type="radio" id="trabajo" name="tipo" value="trabajo" />
            <label for="trabajo">Trabajo</label>

            <!-- CHECKBOX -->
            <p>Intereses:</p>
            <input type="checkbox" id="web" name="interes" value="web" />
            <label for="web">Desarrollo Web</label>

            <input type="checkbox" id="apps" name="interes" value="apps" />
            <label for="apps">Aplicaciones</label>

            <!-- TEXTAREA -->
            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" rows="4" required></textarea>

            <!-- TERMINOS -->
            <input type="checkbox" id="terminos" required />
            <label for="terminos">Acepto los términos y condiciones</label>

            <!-- BOTONES -->
            <button type="submit">Enviar</button>
            <button type="reset">Limpiar</button>
          </fieldset>
        </form>
      </section>
    </main>

    <!-- FOOTER -->
    <footer>
      <p>&copy; 2026 Gabriel Murillo</p>
    </footer>

    <script>
      const header = document.querySelector("header");
      window.addEventListener("scroll", () => {
        if (window.scrollY > 50) {
          header.classList.add("scrolled");
        } else {
          header.classList.remove("scrolled");
        }
      });
    </script>
  </body>
</html>
